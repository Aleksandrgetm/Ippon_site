<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IPPON Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f3f4f6;
      --panel: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --accent: #dc2626;
      --line: #e5e7eb;
      --ok: #166534;
      --danger: #b91c1c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Roboto, sans-serif;
    }

    h1, h2, h3, button {
      font-family: Oswald, sans-serif;
      margin: 0;
    }

    .app {
      min-height: 100vh;
      padding: 20px;
      display: grid;
      place-items: center;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
    }

    .title {
      font-size: 40px;
      line-height: 1;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .title span { color: var(--accent); }

    .sub {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 15px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: 500;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
      margin-bottom: 12px;
      background: #fff;
    }

    textarea {
      min-height: 80px;
      resize: vertical;
    }

    button {
      border: 0;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.3px;
      padding: 10px 14px;
      cursor: pointer;
    }

    button.ghost { background: #0f172a; }
    button.light { background: #e2e8f0; color: #0f172a; }
    button.danger { background: var(--danger); }

    .hidden { display: none !important; }

    .layout {
      width: min(1450px, 100%);
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .toolbar h2 {
      font-size: 30px;
      text-transform: uppercase;
      line-height: 1;
    }

    .toolbar h2 span { color: var(--accent); }

    .row-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .status {
      min-height: 18px;
      font-size: 13px;
      color: var(--muted);
      margin: 6px 0 0;
    }

    .status.ok { color: var(--ok); }
    .status.error { color: var(--danger); }

    .records {
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: auto;
      max-height: 72vh;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      min-width: 700px;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 8px;
      text-align: left;
      vertical-align: top;
    }

    th {
      position: sticky;
      top: 0;
      background: #f8fafc;
      z-index: 1;
    }

    tr.active { background: #fff5f5; }

    .small {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    @media (max-width: 1150px) {
      .layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section id="loginCard" class="card">
      <h1 class="title">Admin <span>Panel</span></h1>
      <p class="sub">��&од в панел�R ђпѬавления базой данн�9�&</p>

      <label for="login">�:огин</label>
      <input id="login" autocomplete="username" />

      <label for="password">�xаѬол�R</label>
      <input id="password" type="password" autocomplete="current-password" />

      <button id="loginBtn" type="button">�ой�и?</button>
      <p id="loginStatus" class="status"></p>
    </section>

    <section id="adminPanel" class="layout hidden">
      <aside class="panel">
        <div class="toolbar">
          <h2>DB <span>Editor</span></h2>
          <button id="logoutBtn" class="ghost" type="button">��9й�и?</button>
        </div>

        <label for="tableSelect">Табли� а</label>
        <select id="tableSelect"></select>
        <label style="display:flex;align-items:center;gap:8px;margin:8px 0 10px;">
          <input id="includeRemovedCb" type="checkbox" style="width:auto;margin:0;" />
          �xоказ�9ва��R ђдаленн�9�& споѬ�сменов
        </label>

        <div class="row-actions">
          <button id="newBtn" class="light" type="button">Новая запис�R?</button>
          <button id="saveBtn" type="button">Со�&Ѭани��R?</button>
          <button id="deleteBtn" class="danger" type="button">Удали��R?</button>
        </div>
        <p id="formStatus" class="status"></p>

        <hr style="border:none;border-top:1px solid var(--line);margin:14px 0;" />
        <div id="formFields"></div>
      </aside>

      <section class="panel">
        <div class="toolbar">
          <h2>Records <span>List</span></h2>
          <div class="row-actions">
            <button id="prevBtn" class="light" type="button">Назад?</button>
            <button id="nextBtn" class="light" type="button">�пеѬед?</button>
          </div>
        </div>
        <p id="listMeta" class="small"></p>
        <div class="records">
          <table>
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </section>
    </section>
  </main>

  <script>
    const AUTH = { login: 'test', password: 'test' };
    const SESSION_KEY = 'ippon_admin_session';
    const PAGE_SIZE = 100;

    const loginCard = document.getElementById('loginCard');
    const adminPanel = document.getElementById('adminPanel');
    const loginInput = document.getElementById('login');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const loginStatus = document.getElementById('loginStatus');
    const logoutBtn = document.getElementById('logoutBtn');

    const tableSelect = document.getElementById('tableSelect');
    const includeRemovedCb = document.getElementById('includeRemovedCb');
    const newBtn = document.getElementById('newBtn');
    const saveBtn = document.getElementById('saveBtn');
    const deleteBtn = document.getElementById('deleteBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    const tableHead = document.getElementById('tableHead');
    const tableBody = document.getElementById('tableBody');
    const formFields = document.getElementById('formFields');
    const formStatus = document.getElementById('formStatus');
    const listMeta = document.getElementById('listMeta');

    let tablesMeta = [];
    let currentTable = null;
    let currentPk = 'id';
    let currentColumns = [];
    let currentRows = [];
    let selectedRow = null;
    let offset = 0;
    let total = 0;
    let apiBase = '';

    function showLogin() {
      adminPanel.classList.add('hidden');
      loginCard.classList.remove('hidden');
    }

    function showAdmin() {
      loginCard.classList.add('hidden');
      adminPanel.classList.remove('hidden');
    }

    function setStatus(text, type) {
      formStatus.textContent = text || '';
      formStatus.className = 'status';
      if (type) formStatus.classList.add(type);
    }

    function buildApiCandidates(path) {
      const cleanPath = path.startsWith('/') ? path : `/${path}`;
      const candidates = [];
      if (apiBase) {
        candidates.push(`${apiBase}${cleanPath}`);
      } else {
        candidates.push(cleanPath);
        candidates.push(`http://127.0.0.1:5510${cleanPath}`);
        candidates.push(`http://127.0.0.1:5500${cleanPath}`);
      }
      return [...new Set(candidates)];
    }

    async function api(path, options = {}) {
      const candidates = buildApiCandidates(path);
      let lastError = new Error('API unavailable');

      for (const url of candidates) {
        try {
          const response = await fetch(url, {
            headers: { 'Content-Type': 'application/json' },
            ...options
          });
          const data = await response.json().catch(() => ({}));
          if (!response.ok) {
            const message = data.error || `HTTP ${response.status}`;
            if (response.status === 404) {
              lastError = new Error(message);
              continue;
            }
            throw new Error(message);
          }

          const absolute = new URL(url, window.location.origin);
          apiBase = `${absolute.protocol}//${absolute.host}`;
          return data;
        } catch (error) {
          lastError = error;
        }
      }

      throw lastError;
    }

    async function loadTables() {
      const data = await api('/api/tables');
      tablesMeta = data.tables;
      tableSelect.innerHTML = tablesMeta
        .map((t) => `<option value="${t.name}">${t.name}</option>`)
        .join('');
      currentTable = tablesMeta[0]?.name || null;
      if (currentTable) {
        tableSelect.value = currentTable;
        await loadTableData(true);
      }
    }

    function getTableMeta(name) {
      return tablesMeta.find((t) => t.name === name);
    }

    function renderForm() {
      formFields.innerHTML = '';
      currentColumns.forEach((col) => {
        const wrap = document.createElement('div');
        const label = document.createElement('label');
        label.textContent = col.name + (col.name === currentPk ? ' (ID)' : '');
        wrap.appendChild(label);

        const lowerType = String(col.type || '').toLowerCase();
        const isLongText = lowerType.includes('text');
        const field = document.createElement(isLongText ? 'textarea' : 'input');
        field.dataset.col = col.name;
        field.disabled = col.name === currentPk;
        field.id = `f_${col.name}`;
        wrap.appendChild(field);
        formFields.appendChild(wrap);
      });
      fillForm(selectedRow);
    }

    function fillForm(row) {
      currentColumns.forEach((col) => {
        const input = document.getElementById(`f_${col.name}`);
        if (!input) return;
        input.value = row && row[col.name] != null ? String(row[col.name]) : '';
      });
    }

    function collectFormData() {
      const payload = {};
      currentColumns.forEach((col) => {
        if (col.name === currentPk) return;
        const input = document.getElementById(`f_${col.name}`);
        if (!input) return;
        const value = input.value;
        payload[col.name] = value === '' ? null : value;
      });
      return payload;
    }

    function titleForRow(row) {
      if (!row) return '';
      const keys = ['name_lv', 'name_ru', 'name_en', 'result', 'filename'];
      for (const key of keys) {
        if (row[key]) return String(row[key]).slice(0, 80);
      }
      return JSON.stringify(row).slice(0, 80);
    }

    function renderTable() {
      tableHead.innerHTML = '';
      tableBody.innerHTML = '';

      const headRow = document.createElement('tr');
      const first = document.createElement('th');
      first.textContent = 'Редак�иѬова��R';
      headRow.appendChild(first);

      currentColumns.slice(0, 6).forEach((col) => {
        const th = document.createElement('th');
        th.textContent = col.name;
        headRow.appendChild(th);
      });
      tableHead.appendChild(headRow);

      currentRows.forEach((row) => {
        const tr = document.createElement('tr');
        if (selectedRow && row[currentPk] === selectedRow[currentPk]) {
          tr.classList.add('active');
        }

        const btnCell = document.createElement('td');
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'light';
        btn.textContent = '�~�кѬ�9��R';
        btn.addEventListener('click', () => {
          selectedRow = row;
          fillForm(row);
          renderTable();
          setStatus(`��9бѬана запис�R ID ${row[currentPk]}`, 'ok');
        });
        btnCell.appendChild(btn);
        tr.appendChild(btnCell);

        currentColumns.slice(0, 6).forEach((col) => {
          const td = document.createElement('td');
          const val = row[col.name];
          td.textContent = val == null ? '' : String(val).slice(0, 120);
          tr.appendChild(td);
        });

        tableBody.appendChild(tr);
      });

      listMeta.textContent = `${currentTable}: ${offset + 1}-${Math.min(offset + PAGE_SIZE, total)} из ${total}`;
    }

    async function loadTableData(resetOffset = false) {
      if (!currentTable) return;
      if (resetOffset) offset = 0;

      const meta = getTableMeta(currentTable);
      currentPk = meta?.pk || 'id';
      currentColumns = meta?.columns || [];

      const includeRemoved =
        currentTable === 'ippon_sportists' && includeRemovedCb.checked ? '&includeRemoved=1' : '';
      const data = await api(`/api/table/${currentTable}?limit=${PAGE_SIZE}&offset=${offset}${includeRemoved}`);
      currentRows = data.rows;
      total = data.total;

      selectedRow = null;
      renderForm();
      renderTable();
      setStatus('');
    }

    async function saveRow() {
      if (!currentTable) return;
      const payload = collectFormData();

      try {
        if (selectedRow && selectedRow[currentPk] != null) {
          const id = selectedRow[currentPk];
          const data = await api(`/api/table/${currentTable}/${id}`, {
            method: 'PUT',
            body: JSON.stringify(payload)
          });
          selectedRow = data.row;
          setStatus(`�апис�R ID ${id} обновлена`, 'ok');
        } else {
          const data = await api(`/api/table/${currentTable}`, {
            method: 'POST',
            body: JSON.stringify(payload)
          });
          selectedRow = data.row;
          setStatus(`Создана новая запис�R ID ${data.row[currentPk]}`, 'ok');
        }
        await loadTableData();
      } catch (error) {
        setStatus(error.message, 'error');
      }
    }

    async function deleteRow() {
      if (!selectedRow || selectedRow[currentPk] == null) {
        setStatus('Сна�!ала в�9беѬи запис�R', 'error');
        return;
      }

      const id = selectedRow[currentPk];
      if (!confirm(`Удали��R запис�R ID ${id}?`)) return;

      try {
        await api(`/api/table/${currentTable}/${id}`, { method: 'DELETE' });
        selectedRow = null;
        setStatus(`�апис�R ID ${id} ђдалена`, 'ok');
        await loadTableData();
      } catch (error) {
        setStatus(error.message, 'error');
      }
    }

    loginBtn.addEventListener('click', async () => {
      const ok = loginInput.value === AUTH.login && passwordInput.value === AUTH.password;
      if (!ok) {
        loginStatus.textContent = 'НевеѬн�9й логин или паѬол�R';
        loginStatus.className = 'status error';
        return;
      }

      loginStatus.textContent = '';
      localStorage.setItem(SESSION_KEY, '1');
      showAdmin();

      try {
        await loadTables();
      } catch (error) {
        setStatus(error.message, 'error');
      }
    });

    logoutBtn.addEventListener('click', () => {
      localStorage.removeItem(SESSION_KEY);
      passwordInput.value = '';
      showLogin();
    });

    tableSelect.addEventListener('change', async () => {
      currentTable = tableSelect.value;
      includeRemovedCb.disabled = currentTable !== 'ippon_sportists';
      await loadTableData(true);
    });

    includeRemovedCb.addEventListener('change', async () => {
      if (currentTable === 'ippon_sportists') {
        await loadTableData(true);
      }
    });

    newBtn.addEventListener('click', () => {
      selectedRow = null;
      fillForm(null);
      renderTable();
      setStatus('Режим создания новой записи', 'ok');
    });

    saveBtn.addEventListener('click', saveRow);
    deleteBtn.addEventListener('click', deleteRow);

    prevBtn.addEventListener('click', async () => {
      offset = Math.max(0, offset - PAGE_SIZE);
      await loadTableData();
    });

    nextBtn.addEventListener('click', async () => {
      if (offset + PAGE_SIZE >= total) return;
      offset += PAGE_SIZE;
      await loadTableData();
    });

    async function boot() {
      if (localStorage.getItem(SESSION_KEY) === '1') {
        showAdmin();
        try {
          await loadTables();
          includeRemovedCb.disabled = currentTable !== 'ippon_sportists';
        } catch (error) {
          setStatus(error.message, 'error');
        }
      } else {
        showLogin();
      }
    }

    boot();
  </script>
<script src="/assets/lang-switcher.js" defer></script></body>
</html>
